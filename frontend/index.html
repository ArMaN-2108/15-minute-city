<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>15-Minute City</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-variant": "#c3ecd7",
              "error": "#ba1a1a",
              "secondary-fixed": "#baeed1",
              "on-secondary": "#ffffff",
              "on-primary-container": "#00422b",
              "secondary": "#376850",
              "on-secondary-container": "#3c6c54",
              "on-background": "#002115",
              "surface-dim": "#bbe3cf",
              "outline": "#6c7a71",
              "on-error": "#ffffff",
              "primary": "#006c49",
              "on-tertiary-fixed-variant": "#842225",
              "tertiary": "#a43a3a",
              "surface-container": "#cef7e2",
              "primary-fixed-dim": "#4edea3",
              "on-tertiary-fixed": "#410005",
              "surface-container-lowest": "#ffffff",
              "primary-fixed": "#6ffbbe",
              "tertiary-fixed": "#ffdad7",
              "surface-tint": "#006c49",
              "tertiary-container": "#fc7c78",
              "surface-container-high": "#c9f1dd",
              "on-secondary-fixed-variant": "#1e4f3a",
              "on-primary": "#ffffff",
              "surface-container-low": "#d4fde8",
              "primary-container": "#10b981",
              "on-tertiary-container": "#711419",
              "on-primary-fixed": "#002113",
              "tertiary-fixed-dim": "#ffb3af",
              "surface-container-highest": "#c3ecd7",
              "surface-bright": "#e7fff1",
              "inverse-primary": "#4edea3",
              "on-tertiary": "#ffffff",
              "surface": "#e7fff1",
              "secondary-container": "#b7ebce",
              "on-surface-variant": "#3c4a42",
              "on-error-container": "#93000a",
              "background": "#e7fff1",
              "inverse-surface": "#113729",
              "secondary-fixed-dim": "#9ed2b5",
              "on-primary-fixed-variant": "#005236",
              "outline-variant": "#bbcabf",
              "on-surface": "#002115",
              "inverse-on-surface": "#d1fae5",
              "on-secondary-fixed": "#002113",
              "error-container": "#ffdad6"
            },
            borderRadius: {
              "DEFAULT": "1rem",
              "lg": "2rem",
              "xl": "3rem",
              "full": "9999px"
            },
            fontFamily: {
              "headline": ["Inter"],
              "display": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            }
          },
        },
      }
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #e7fff1;
      }
      .radar-hex {
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #e7fff1;
      }
      ::-webkit-scrollbar-thumb {
        background: #10b981;
        border-radius: 10px;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body class="min-h-screen flex flex-col text-on-surface">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
